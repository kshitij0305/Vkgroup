<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#sunGradient)" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="3" x2="16" y2="6"/>
    <line x1="16" y1="26" x2="16" y2="29"/>
    <line x1="3" y1="16" x2="6" y2="16"/>
    <line x1="26" y1="16" x2="29" y2="16"/>
    <line x1="6.34" y1="6.34" x2="8.46" y2="8.46"/>
    <line x1="23.54" y1="23.54" x2="25.66" y2="25.66"/>
    <line x1="6.34" y1="25.66" x2="8.46" y2="23.54"/>
    <line x1="23.54" y1="8.46" x2="25.66" y2="6.34"/>
  </g>
  
  <!-- Inner circle for text background -->
  <circle cx="16" cy="16" r="9" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- VK Text -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#000000">VK</text>
</svg> 